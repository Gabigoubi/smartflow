version: "3.8"

services:
  db:
    image: postgres:latest
    container_name: postgres_smartflow
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: smartflow
    ports:
      - "5432:5432"

    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql
